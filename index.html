<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0820" />
  <title>🎲 BoardScore</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0820;
      --surface: #160d30;
      --card: #1e1240;
      --accent: #f5c542;
      --accent2: #e05c2a;
      --green: #3ddc84;
      --blue: #38bdf8;
      --purple: #9b59f5;
      --text: #f0eaff;
      --muted: #7a6e99;
      --border: rgba(245,197,66,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
              radial-gradient(ellipse 80% 50% at 15% 10%, rgba(94,50,180,0.3) 0%, transparent 55%),
              radial-gradient(ellipse 60% 40% at 85% 85%, rgba(224,92,42,0.18) 0%, transparent 55%),
              radial-gradient(ellipse 50% 60% at 60% 30%, rgba(56,189,248,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }

    /* ── HEADER ── */
    header {
      padding: 28px 20px 20px;
      text-align: center;
    }
    .logo { font-size: 2.4rem; margin-bottom: 6px; }
    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 900;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }
    .app-title span { color: var(--accent2); }
    .app-sub {
      font-size: 0.8rem; color: var(--muted);
      margin-top: 6px; letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── SEARCH ── */
    .search-bar {
      margin: 0 16px 16px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px 12px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem; color: var(--muted);
      pointer-events: none;
    }

    /* ── FILTERS ── */
    .filters-wrap {
      padding: 0 16px;
      margin-bottom: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters-wrap::-webkit-scrollbar { display: none; }
    .filters {
      display: flex;
      gap: 8px;
      width: max-content;
    }
    .filter-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .filter-btn:active { transform: scale(0.95); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a0a2e;
    }
    .filter-btn .filter-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: 0.7;
    }

    /* ── SECTION TITLE ── */
    .section-header {
      padding: 0 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-label {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted);
    }
    .games-count {
      font-size: 0.75rem; color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 10px;
    }

    /* ── GAME GRID ── */
    .games-grid {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── GAME CARD ── */
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
    }
    .game-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--game-color, var(--accent));
      border-radius: 4px 0 0 4px;
    }
    .game-card:active { transform: scale(0.98); border-color: var(--game-color, var(--accent)); }
    .game-card:hover { border-color: rgba(245,197,66,0.35); }

    .game-card-inner { display: flex; align-items: center; gap: 14px; }
    .game-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--game-bg, rgba(245,197,66,0.12));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    .game-info { flex: 1; min-width: 0; }
    .game-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .game-desc {
      font-size: 0.78rem; color: var(--muted);
      line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .game-tags {
      display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap;
    }
    .tag {
      font-size: 0.65rem; font-weight: 600;
      padding: 2px 8px; border-radius: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tag-multi { background: rgba(56,189,248,0.15); color: var(--blue); }
    .tag-coop  { background: rgba(61,220,132,0.15); color: var(--green); }
    .tag-solo  { background: rgba(245,197,66,0.15); color: var(--accent); }
    .tag-dominos { background: rgba(224,92,42,0.15); color: var(--accent2); }
    .tag-cartes { background: rgba(155,89,245,0.15); color: var(--purple); }
    .tag-des   { background: rgba(251,113,133,0.15); color: #fb7185; }
    .tag-plateau { background: rgba(163,230,53,0.15); color: #a3e635; }

    .game-arrow {
      font-size: 1.2rem; color: var(--muted);
      margin-left: 8px; flex-shrink: 0;
      transition: color 0.18s, transform 0.18s;
    }
    .game-card:active .game-arrow { color: var(--game-color, var(--accent)); transform: translateX(4px); }

    /* ── COMING SOON CARD ── */
    .game-card.soon {
      opacity: 0.5;
      cursor: default;
    }
    .game-card.soon:active { transform: none; }
    .soon-badge {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--muted); font-size: 0.62rem; font-weight: 600;
      padding: 2px 8px; border-radius: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 50px 20px;
      color: var(--muted);
    }
    .empty-state .big-emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 20px 10px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.5px;
    }
    footer span { color: var(--accent2); }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">🎲</div>
    <div class="app-title">Board<span>Score</span></div>
    <div class="app-sub">Compteurs de points pour jeux de société</div>
  </header>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un jeu…" oninput="filterGames()" />
  </div>

  <div class="filters-wrap">
    <div class="filters" id="filtersBar">
      <!-- generated by JS -->
    </div>
  </div>

  <div class="section-header">
    <div class="section-label">Jeux disponibles</div>
    <div class="games-count" id="gamesCount">…</div>
  </div>

  <div class="games-grid" id="gamesGrid">
    <!-- generated by JS -->
  </div>

  <footer>Fait avec <span>♥</span> pour les soirées jeux</footer>
</div>

<script>
  /* ── DATA ── */
  const GAMES = [
    {
      id: 'mexican-train',
      name: 'Train Mexicain',
      emoji: '🚂',
      desc: 'Dominos — pose tes tuiles sur le train central',
      tags: ['multi', 'dominos'],
      color: '#f5c542',
      bg: 'rgba(245,197,66,0.12)',
      url: 'games/mexican-train/index.html',
      available: true,
    },
    {
      id: 'skyjo',
      name: 'Skyjo',
      emoji: '🃏',
      desc: 'Cartes — minimise ton score en retournant des cartes',
      tags: ['multi', 'cartes'],
      color: '#38bdf8',
      bg: 'rgba(56,189,248,0.12)',
      url: null,
      available: false,
    },
    {
      id: 'uno',
      name: 'Uno',
      emoji: '🎴',
      desc: 'Cartes — vide ta main le premier !',
      tags: ['multi', 'cartes'],
      color: '#fb7185',
      bg: 'rgba(251,113,133,0.12)',
      url: null,
      available: false,
    },
    {
      id: 'yam',
      name: "Yam's",
      emoji: '🎲',
      desc: 'Dés — combinaisons et stratégie',
      tags: ['multi', 'des'],
      color: '#a3e635',
      bg: 'rgba(163,230,53,0.12)',
      url: null,
      available: false,
    },
    {
      id: 'scrabble',
      name: 'Scrabble',
      emoji: '🔠',
      desc: 'Plateau — forme des mots et accumule les points',
      tags: ['multi', 'plateau'],
      color: '#9b59f5',
      bg: 'rgba(155,89,245,0.12)',
      url: null,
      available: false,
    },
  ];

  const FILTERS = [
    { id: 'all',     label: 'Tous',     emoji: '🎲' },
    { id: 'multi',   label: 'Multi',    emoji: '👥' },
    { id: 'coop',    label: 'Coop',     emoji: '🤝' },
    { id: 'solo',    label: 'Solo',     emoji: '🧍' },
    { id: 'dominos', label: 'Dominos',  emoji: '🁣' },
    { id: 'cartes',  label: 'Cartes',   emoji: '🃏' },
    { id: 'des',     label: 'Dés',      emoji: '🎲' },
    { id: 'plateau', label: 'Plateau',  emoji: '♟️' },
  ];

  let activeFilter = 'all';

  /* ── BUILD FILTERS ── */
  function renderFilters() {
    document.getElementById('filtersBar').innerHTML = FILTERS.map(f =>
            `<button class="filter-btn ${f.id === activeFilter ? 'active' : ''}" onclick="setFilter('${f.id}')">
        ${f.emoji} ${f.label}
      </button>`
    ).join('');
  }

  function setFilter(id) {
    activeFilter = id;
    renderFilters();
    filterGames();
  }

  /* ── TAG HTML ── */
  function tagHtml(tag) {
    const labels = {
      multi: 'Multijoueur', coop: 'Coop', solo: 'Solo',
      dominos: 'Dominos', cartes: 'Cartes', des: 'Dés', plateau: 'Plateau'
    };
    return `<span class="tag tag-${tag}">${labels[tag] || tag}</span>`;
  }

  /* ── RENDER GAMES ── */
  function filterGames() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const grid = document.getElementById('gamesGrid');

    const visible = GAMES.filter(g => {
      const matchFilter = activeFilter === 'all' || g.tags.includes(activeFilter);
      const matchSearch = !search ||
              g.name.toLowerCase().includes(search) ||
              g.desc.toLowerCase().includes(search) ||
              g.tags.some(t => t.includes(search));
      return matchFilter && matchSearch;
    });

    document.getElementById('gamesCount').textContent = visible.length + ' jeu' + (visible.length > 1 ? 'x' : '');

    if (visible.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <div class="big-emoji">🔍</div>
        <p>Aucun jeu ne correspond à ta recherche.<br>Essaie un autre filtre !</p>
      </div>`;
      return;
    }

    grid.innerHTML = visible.map(g => {
      if (!g.available) {
        return `<div class="game-card soon" style="--game-color:${g.color};--game-bg:${g.bg}">
          <span class="soon-badge">Bientôt</span>
          <div class="game-card-inner">
            <div class="game-icon">${g.emoji}</div>
            <div class="game-info">
              <div class="game-name">${g.name}</div>
              <div class="game-desc">${g.desc}</div>
              <div class="game-tags">${g.tags.map(tagHtml).join('')}</div>
            </div>
          </div>
        </div>`;
      }
      return `<a href="${g.url}" class="game-card" style="--game-color:${g.color};--game-bg:${g.bg}">
        <div class="game-card-inner">
          <div class="game-icon">${g.emoji}</div>
          <div class="game-info">
            <div class="game-name">${g.name}</div>
            <div class="game-desc">${g.desc}</div>
            <div class="game-tags">${g.tags.map(tagHtml).join('')}</div>
          </div>
          <span class="game-arrow">→</span>
        </div>
      </a>`;
    }).join('');
  }

  /* ── INIT ── */
  renderFilters();
  filterGames();
</script>
</body>
</html>
