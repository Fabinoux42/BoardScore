<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0820" />
  <title>🎲 BoardScore</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="menu.css" />
</head>
<body>
<div id="app">

  <header>
    <div class="logo">🎲</div>
    <div class="app-title">Board<span>Score</span></div>
    <div class="app-sub">Compteurs de points pour jeux de société</div>
    <div class="install-hint" id="installHint">
      💡 <strong>Installer :</strong> Chrome → menu ⋮ → <br>"Ajouter à l'écran d'accueil"
    </div>
  </header>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un jeu…" oninput="filterGames()" />
  </div>

  <div class="filters-wrap">
    <div class="filters" id="filtersBar"></div>
  </div>

  <div class="section-header">
    <div class="section-label">Jeux disponibles</div>
    <div class="games-count" id="gamesCount">…</div>
  </div>

  <div class="games-grid" id="gamesGrid"></div>

  <footer>
    Fait avec <span>♥</span> pour les soirées jeux
    <br>
    <button class="reset-btn" onclick="confirmReset()">🔄 Réinitialiser les données</button>
  </footer>
</div>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>

<script src="menu.js"></script>
</body>
</html>
